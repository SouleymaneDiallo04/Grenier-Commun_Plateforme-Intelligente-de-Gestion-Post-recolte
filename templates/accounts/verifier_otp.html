{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Vérification OTP" %}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gc-700 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl">📱</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">{% trans "Vérification du téléphone" %}</h1>
      <p class="text-gray-500 mt-1">{% trans "Entrez le code à 6 chiffres reçu par SMS" %}</p>
    </div>
    <div class="gc-card">
      <form method="POST" action="{% url 'accounts:verifier_otp' %}" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="gc-label">{% trans "Numéro de téléphone" %}</label>
          <input type="tel" name="telephone" class="gc-input" placeholder="+221 77 000 00 00" required>
        </div>
        <div>
          <label class="gc-label">{% trans "Code OTP" %}</label>
          <input type="text" name="code" class="gc-input text-center text-2xl tracking-widest font-mono"
            placeholder="000000" maxlength="6" pattern="\d{6}" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg">{% trans "Vérifier mon numéro" %}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
